name: Daily update

# Deterministischer Tageskern (kein LLM): Daten holen -> Reports/Technik neu
# -> Portfolio/Forward-Test neu (Trades loesen via SL/TP/Horizont) -> commit + push.
# Neue Agent-Analysen/Signale entstehen hier NICHT (das ist die LLM-Schicht).

on:
  schedule:
    - cron: "30 22 * * *"   # taeglich 22:30 UTC (nach US-Boersenschluss)
  workflow_dispatch: {}      # manuell ausloesbar

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch market data (Twelve Data + Yahoo)
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scripts/fetch_all.py

      - name: Build reports (technical; preserves agent_analysis + signals)
        run: python scripts/build_reports.py

      - name: Update portfolio + forward-test
        run: |
          python scripts/build_portfolio.py
          python scripts/evaluate_signals.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          fi
