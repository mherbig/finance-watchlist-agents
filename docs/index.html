<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multi-Asset Watchlist-Analyse</title>
  <link rel="stylesheet" href="assets/style.css?v=20260708a" />
</head>
<body>
  <div id="banner" class="banner">
    <span id="updated" class="banner-updated"></span>
  </div>

  <header class="page-header">
    <h1>Multi-Asset Watchlist-Analyse</h1>
    <p class="subtitle">Technik-Lesart und Agent-Analyse je Symbol.</p>
    <p class="legend">
      <span class="agent-badge agent-badge-panel">🧩 Fundamental</span> volles 6-Agent-Panel (Aktien)
      &nbsp;·&nbsp;
      <span class="agent-badge agent-badge-tech">📈 Technisch</span> Technical/Macro-Agent
    </p>
    <p id="track-record" class="track-record"></p>
  </header>

  <nav class="tabs" role="tablist">
    <button id="tab-overview" class="tab-btn is-active" role="tab" aria-selected="true">Übersicht</button>
    <button id="tab-portfolio" class="tab-btn" role="tab" aria-selected="false">Signale &amp; Depot</button>
  </nav>

  <main id="grid" class="grid-root" data-tab="overview">
    <p id="loading" class="loading">Lade Reports …</p>
  </main>

  <section id="portfolio-view" class="portfolio-view" data-tab="portfolio" hidden>
    <p class="loading">Lade Depot …</p>
  </section>

  <!-- Detail-Modal -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" class="modal-close" aria-label="Schließen">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="assets/app.js?v=20260708a"></script>
</body>
</html>
